version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
    AIRFLOW__WEBSERVER__SECRET_KEY: "changeme"
    MLFLOW_TRACKING_URI: http://mlflow:5000
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./feature_store:/opt/airflow/feature_store
    - ./training:/opt/airflow/training
    - ./data:/opt/airflow/data
    - airflow-logs:/opt/airflow/logs
    - mlflow-data:/opt/mlflow
  depends_on:
    mlflow:
      condition: service_healthy

services:
  # ─── MLflow tracking server ───────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow==2.13.0 --quiet &&
               mlflow server
               --backend-store-uri sqlite:////opt/mlflow/mlflow.db
               --default-artifact-root /opt/mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/opt/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Airflow init (runs once) ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "pip install feast==0.40.0 scikit-learn pandas mlflow==2.13.0 --quiet &&
               airflow db migrate &&
               airflow users create --username admin --password admin
               --firstname Admin --lastname Admin --role Admin
               --email admin@example.com"
    restart: "no"

  # ─── Airflow webserver ────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install feast==0.40.0 scikit-learn pandas mlflow==2.13.0 --quiet &&
               airflow webserver"
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Airflow scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install feast==0.40.0 scikit-learn pandas mlflow==2.13.0 --quiet &&
               airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy

  # ─── FastAPI inference service ────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: oil_gas_forecast
      MODEL_STAGE: Production
    volumes:
      - ./feature_store:/app/feature_store
      - mlflow-data:/opt/mlflow
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mlflow-data:
  airflow-logs:
